# Configurable Cell Component Whitelist
# ======================================
# Lists all ME Storage Components accepted by the Configurable Storage Cell.
# Format: registry_name@metadata = bytes,channel,tier_name
#   - registry_name@metadata: item ID and damage value (e.g. appliedenergistics2:material@35)
#   - bytes: total byte capacity of the component
#   - channel: "item", "fluid", "essentia" (Thaumic Energistics), or "gas" (Mekanism Energistics)
#   - tier_name: used for texture/model selection and name display (e.g. "1k", "64k")
#
# Lines starting with # are comments. Blank lines are ignored.
# Restart the game after modifying this file.
#
# ======================================
# CUSTOM TIER WARNINGS
# ======================================
# Modpack developers can add custom components with any tier name. However:
#
# 1. TEXTURES: Only the following tier names have bundled textures:
#    1k, 4k, 16k, 64k, 256k, 1m, 4m, 16m, 64m, 256m, 1g, 2g
#    Custom tier names should be provided by the modpack maker, otherwise the cell will show a missing texture.
#
# 2. TYPE OVERHEAD: The bytes-per-type overhead at max types is exactly half of the cell size.
#    This means a 1k cell has 512 bytes of overhead when completely full, instead of 8*maxTypes,
#    allowing for flexible maxTypes config without breaking the cell (like above 128 types).
#    This ratio is fixed and cannot be customized per-component.
#
# 3. OVERFLOW: NO OVERFLOW PROTECTION IS PROVIDED!
#    The underlying storage uses 'long' type (~9.2 quintillion max value).
#    Be mindful when using very large capacities, always test using the /fillCell command.
#    At extreme values (near Long.MAX_VALUE), arithmetic may overflow.
#    CELLS mod is NOT responsible for data loss due to overflow in custom configs.
#

# ========================
# AE2 - Item Components
# ========================
appliedenergistics2:material@35 = 1024,item,1k
appliedenergistics2:material@36 = 4096,item,4k
appliedenergistics2:material@37 = 16384,item,16k
appliedenergistics2:material@38 = 65536,item,64k

